services:
  # Backend WebSocket server
  - type: web
    name: skribbl-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3001
      - key: CLIENT_URL
        value: https://skribbl-client.onrender.com   # update after deploying frontend

  # Frontend static site
  - type: web
    name: skribbl-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://skribbl-server.onrender.com   # update to match backend URL
